<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>YSYRAEL ❤️ Mon Gros Cœur pour Toi - I LOVE YOU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #ff1e56 0%, #2c0b1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Dancing Script', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            position: relative;
            cursor: pointer;
            padding: 16px;
        }

        /* Conteneur principal responsive */
        .heart-container {
            position: relative;
            z-index: 20;
            text-align: center;
            animation: fadeInScale 1.2s ease-out;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Le gros cœur SVG qui bat - responsive */
        .big-heart {
            width: min(280px, 70vw);
            height: min(280px, 70vw);
            animation: heartbeat 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 80, 120, 0.8));
            margin: 0 auto;
        }

        @keyframes heartbeat {
            0% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.15);
            }
            35% {
                transform: scale(1.1);
            }
            45% {
                transform: scale(1.2);
            }
            55% {
                transform: scale(1.08);
            }
            65% {
                transform: scale(1.12);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Texte I LOVE YOU responsive */
        .love-text {
            font-size: clamp(1.8rem, 10vw, 3.8rem);
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #ff4d4d, 0 0 40px #ff1a1a;
            letter-spacing: clamp(2px, 2vw, 8px);
            margin-top: clamp(15px, 5vw, 30px);
            animation: textGlow 1.5s ease-in-out infinite;
            font-family: 'Dancing Script', cursive;
            word-break: keep-all;
        }

        @keyframes textGlow {
            0%, 100% {
                text-shadow: 0 0 10px #ff4d4d, 0 0 20px #ff1a1a;
                opacity: 1;
            }
            50% {
                text-shadow: 0 0 30px #ff9999, 0 0 50px #ff4d4d;
                opacity: 0.95;
            }
        }

        /* Prénom YSYRAEL en grand */
        .her-name {
            font-size: clamp(1.2rem, 6vw, 2rem);
            color: #ffdd99;
            margin-top: 15px;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff6600;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        /* Sous-texte responsive */
        .sub-message {
            color: #ffdddd;
            font-size: clamp(0.8rem, 4vw, 1.1rem);
            margin-top: 20px;
            font-style: italic;
            animation: fadeInUp 1s ease-out 0.5s both;
            padding: 0 10px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bouton retour responsive */
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: clamp(10px, 3.5vw, 14px) clamp(20px, 6vw, 28px);
            border-radius: 50px;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
            text-decoration: none;
            font-weight: bold;
            animation: fadeInUp 1s ease-out 1s both;
            white-space: nowrap;
        }

        .back-btn:hover, .back-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: translateX(-50%) scale(1.05);
        }

        /* Petits cœurs flottants */
        .floating-heart {
            position: absolute;
            font-size: clamp(1rem, 4vw, 1.8rem);
            pointer-events: none;
            animation: floatLove 6s linear forwards;
            z-index: 5;
            opacity: 0.8;
        }

        @keyframes floatLove {
            0% {
                transform: translateY(100vh) scale(0.3) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.9;
            }
            80% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-20vh) scale(1.2) rotate(20deg);
                opacity: 0;
            }
        }

        /* Étoiles et particules d'amour */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: gold;
            border-radius: 50%;
            box-shadow: 0 0 10px gold;
            animation: sparkleAnim 2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes sparkleAnim {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Message distance France-Cameroun */
        .distance-message {
            position: fixed;
            top: clamp(10px, 3vw, 20px);
            left: clamp(10px, 3vw, 20px);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: clamp(6px, 2.5vw, 10px) clamp(12px, 4vw, 16px);
            border-radius: 30px;
            color: white;
            font-size: clamp(0.65rem, 3vw, 0.85rem);
            z-index: 100;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Effet au clic responsive */
        .click-effect {
            position: fixed;
            pointer-events: none;
            font-size: clamp(1.2rem, 5vw, 2rem);
            animation: clickPop 0.5s ease-out forwards;
            z-index: 200;
        }
        
        @keyframes clickPop {
            0% {
                transform: scale(0.2);
                opacity: 1;
            }
            100% {
                transform: scale(1.8) translateY(-40px);
                opacity: 0;
            }
        }

        /* Responsive fine tuning */
        @media (max-width: 480px) {
            .back-btn {
                white-space: normal;
                text-align: center;
                line-height: 1.3;
                padding: 10px 16px;
                bottom: 15px;
            }
            .distance-message {
                white-space: normal;
                max-width: 85%;
                line-height: 1.3;
                text-align: center;
            }
            .heart-container {
                margin-top: -20px;
            }
        }

        @media (min-width: 768px) {
            .big-heart {
                width: 300px;
                height: 300px;
            }
        }

        /* Touch optimization */
        .back-btn:active {
            transform: translateX(-50%) scale(0.98);
        }

        /* Chatbox romantique */
        .chatbox-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        .chatbox-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 65, 108, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .chatbox-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(255, 65, 108, 0.6);
        }

        .chatbox {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 320px;
            height: 400px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chatbox.active {
            display: flex;
        }

        .chatbox-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
            position: relative;
        }

        .chatbox-header::after {
            content: '💕';
            position: absolute;
            right: 15px;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message-bubble {
            display: inline-block;
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.love .message-bubble {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .message-input-section {
            padding: 15px;
            border-top: 1px solid #eee;
            background: white;
        }

        .message-input-section textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 13px;
            resize: vertical;
            min-height: 60px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .message-input-section textarea:focus {
            border-color: #ff416c;
        }

        .message-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .save-message-btn, .view-messages-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }

        .save-message-btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
        }

        .view-messages-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .save-message-btn:hover, .view-messages-btn:hover {
            transform: scale(1.05);
        }

        .saved-messages {
            display: none;
            padding: 15px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }

        .saved-messages.active {
            display: block;
        }

        .saved-message-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 3px solid #ff416c;
            font-size: 12px;
            position: relative;
        }

        .saved-message-time {
            font-size: 10px;
            color: #666;
            margin-bottom: 5px;
        }

        .delete-message {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff416c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .delete-message:hover {
            opacity: 1;
        }

        .chatbox-input {
            padding: 12px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
            background: white;
        }

        .chatbox-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .chatbox-input input:focus {
            border-color: #ff416c;
        }

        .chatbox-send {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .chatbox-send:hover {
            transform: scale(1.1);
        }

        .chatbox-send:active {
            transform: scale(0.95);
        }

        /* Responsive chatbox */
        @media (max-width: 480px) {
            .chatbox-container {
                bottom: 15px;
                right: 15px;
            }

            .chatbox {
                width: 280px;
                height: 350px;
                right: -10px;
            }

            .chatbox-toggle {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }

        /* Floating hearts from chatbox */
        .chat-heart {
            position: absolute;
            font-size: 12px;
            pointer-events: none;
            animation: floatChatHeart 3s ease-out forwards;
            z-index: 1001;
        }

        @keyframes floatChatHeart {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(0.5);
            }
        }
    </style>
</head>
<body>

<div class="distance-message">
    🇫🇷 → 💖 → 🇨🇲 | 4 548 km d'amour pour YSYRAEL
</div>

<div class="heart-container">
    <!-- Gros cœur SVG animé -->
    <svg class="big-heart" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ff0844;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#ffb199;stop-opacity:1" />
            </linearGradient>
            <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
        <path d="M50,30 C50,15 30,5 18,15 C6,25 6,45 18,55 L50,85 L82,55 C94,45 94,25 82,15 C70,5 50,15 50,30 Z" 
              fill="url(#heartGrad)" stroke="#ff4d6d" stroke-width="2" filter="url(#glow)"/>
    </svg>
    
    <div class="love-text">I LOVE YOU</div>
    <div class="her-name">💖 YSYRAEL 💖</div>
    <div class="sub-message">
        Mon cœur bat pour toi, au Cameroun comme en France<br>
        <span style="font-size: 0.85em;">✨ Tu es ma raison de rêver chaque jour ✨</span>
    </div>
</div>

<a href="index.html" class="back-btn">⬅ Retour à ma lettre</a>

<!-- Chatbox romantique -->
<div class="chatbox-container">
    <button class="chatbox-toggle" id="chatToggle">💬</button>
    <div class="chatbox" id="chatbox">
        <div class="chatbox-header">
            Messages d'amour pour YSYRAEL
        </div>
        <div class="chatbox-messages" id="chatMessages">
            <div class="message love">
                <div class="message-bubble">Mon cœur bat pour toi ! 💕</div>
                <div class="message-time">Maintenant</div>
            </div>
        </div>
        <div class="message-input-section">
            <textarea id="messageInput" placeholder="Laisse un message d'amour pour moi..."></textarea>
            <div class="message-actions">
                <button class="save-message-btn" id="saveMessageBtn">💾 Sauvegarder</button>
                <button class="view-messages-btn" id="viewMessagesBtn">📋 Voir messages</button>
            </div>
        </div>
        <div class="saved-messages" id="savedMessages">
            <div style="font-weight: bold; margin-bottom: 10px; color: #ff416c;">Messages sauvegardés 💕</div>
            <button id="viewJsonBtn" style="background: linear-gradient(135deg, #4CAF50, #45a049); color: white; border: none; padding: 6px 12px; border-radius: 15px; font-size: 11px; cursor: pointer; margin-bottom: 10px; width: 100%;">📊 Voir les données JSON</button>
            <div id="messagesList"></div>
        </div>
    </div>
</div>

<script>
    // Fonction pour créer un cœur flottant aléatoire
    function createFloatingHeart() {
        const heart = document.createElement('div');
        heart.classList.add('floating-heart');
        const hearts = ['❤️', '💖', '💗', '💓', '💘', '💝', '💕', '💞', '💟', '❣️'];
        heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.bottom = '-20px';
        heart.style.fontSize = (1 + Math.random() * 2) + 'rem';
        heart.style.animationDuration = (4 + Math.random() * 6) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
    }

    // Créer des étincelles au clic
    function createSparkle(x, y) {
        const sparkleCount = window.innerWidth < 600 ? 6 : 12;
        for(let i = 0; i < sparkleCount; i++) {
            const spark = document.createElement('div');
            spark.classList.add('sparkle');
            spark.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
            spark.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
            spark.style.width = (3 + Math.random() * 6) + 'px';
            spark.style.height = spark.style.width;
            spark.style.background = `hsl(${Math.random() * 40 + 340}, 100%, 65%)`;
            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 2000);
        }
    }

    // Effet de clic : un cœur qui pop
    function createClickHeart(e) {
        const clickHeart = document.createElement('div');
        clickHeart.classList.add('click-effect');
        clickHeart.innerHTML = ['❤️', '💖', '💗', '💘', '💕', '💝'][Math.floor(Math.random() * 6)];
        clickHeart.style.left = (e.clientX - 15) + 'px';
        clickHeart.style.top = (e.clientY - 20) + 'px';
        document.body.appendChild(clickHeart);
        setTimeout(() => clickHeart.remove(), 500);
        
        createSparkle(e.clientX, e.clientY);
        
        // Ajouter un cœur flottant en plus
        createFloatingHeart();
    }

    // Production continue de cœurs flottants (adapté mobile)
    const initialHearts = window.innerWidth < 600 ? 15 : 25;
    for(let i = 0; i < initialHearts; i++) {
        setTimeout(() => createFloatingHeart(), i * 150);
    }
    
    setInterval(() => {
        createFloatingHeart();
        if(Math.random() > 0.7) createFloatingHeart();
        
        // Limiter le nombre de cœurs flottants sur mobile
        if(window.innerWidth < 600) {
            const hearts = document.querySelectorAll('.floating-heart');
            if(hearts.length > 40) {
                for(let i = 0; i < 10; i++) {
                    if(hearts[i]) hearts[i].remove();
                }
            }
        }
    }, 700);

    // Rendre la page interactive au clic (touch & mouse)
    document.body.addEventListener('click', function(e) {
        createClickHeart(e);
    });
    
    document.body.addEventListener('touchstart', function(e) {
        const touch = e.touches[0];
        createClickHeart(touch);
    });

    // Petit effet sonore optionnel (Web Audio)
    let audioCtx = null;
    function initAudio() {
        if(audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
    }
    
    function playClickSound() {
        if(!audioCtx) initAudio();
        if(audioCtx && audioCtx.state !== 'running') {
            audioCtx.resume().catch(()=>{});
        }
    }
    
    // Préparer audio au premier clic
    document.body.addEventListener('click', function once() {
        if(audioCtx && audioCtx.state !== 'running') {
            audioCtx.resume().catch(()=>{});
        }
    }, { once: true });

    // Chatbox functionality
    const chatToggle = document.getElementById('chatToggle');
    const chatbox = document.getElementById('chatbox');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const chatMessages = document.getElementById('chatMessages');

    // Toggle chatbox
    chatToggle.addEventListener('click', () => {
        chatbox.classList.toggle('active');
        chatToggle.innerHTML = chatbox.classList.contains('active') ? '✕' : '💬';
        if (chatbox.classList.contains('active')) {
            chatInput.focus();
        }
    });

    // Create floating heart effect
    function createChatHeart() {
        const heart = document.createElement('div');
        heart.classList.add('chat-heart');
        const hearts = ['❤️', '💖', '💗', '💓', '💘'];
        heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = (Math.random() * 60 + 20) + 'px';
        heart.style.bottom = '80px';
        document.querySelector('.chatbox-container').appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
    }

    // Romantic responses
    const loveResponses = [
        "Je t'aime plus que tout ! 💕",
        "Tu es mon cœur, mon amour 🌹",
        "Chaque battement de mon cœur est pour toi ❤️",
        "Tu es la plus belle des créations ✨",
        "Mon amour pour toi est infini 💝",
        "Tu illumines ma vie comme le soleil ☀️",
        "Avec toi, je suis complet(te) 🌟",
        "Tu es ma raison d'être 🎆",
        "Ton amour est mon plus grand trésor 💎",
        "Je vis pour t'aimer 🥰"
    ];

    // Send message function
    function sendMessage() {
        const message = chatInput.value.trim();
        if (message === '') return;

        // Add user message
        const userMessage = document.createElement('div');
        userMessage.classList.add('message', 'user');
        userMessage.innerHTML = `
            <div class="message-bubble">${message}</div>
            <div class="message-time">${new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'})}</div>
        `;
        chatMessages.appendChild(userMessage);

        // Clear input
        chatInput.value = '';

        // Scroll to bottom
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Create heart effect
        createChatHeart();

        // Simulate response after delay
        setTimeout(() => {
            const response = loveResponses[Math.floor(Math.random() * loveResponses.length)];
            const loveMessage = document.createElement('div');
            loveMessage.classList.add('message', 'love');
            loveMessage.innerHTML = `
                <div class="message-bubble">${response}</div>
                <div class="message-time">${new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'})}</div>
            `;
            chatMessages.appendChild(loveMessage);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            createChatHeart();
        }, 1000 + Math.random() * 1000);
    }

    // Send message on button click
    chatSend.addEventListener('click', sendMessage);

    // Send message on Enter key
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    // Close chatbox when clicking outside
    document.addEventListener('click', (e) => {
        if (!chatbox.contains(e.target) && !chatToggle.contains(e.target) && chatbox.classList.contains('active')) {
            chatbox.classList.remove('active');
            chatToggle.innerHTML = '💬';
        }
    });

    // Message saving functionality
    const messageInput = document.getElementById('messageInput');
    const saveMessageBtn = document.getElementById('saveMessageBtn');
    const viewMessagesBtn = document.getElementById('viewMessagesBtn');
    const savedMessages = document.getElementById('savedMessages');
    const messagesList = document.getElementById('messagesList');

    // Load saved messages from localStorage and JSON file
    function loadMessages() {
        const messages = JSON.parse(localStorage.getItem('loveMessages') || '[]');
        return messages;
    }

    // Save messages to localStorage and create JSON file
    function saveMessages(messages) {
        localStorage.setItem('loveMessages', JSON.stringify(messages));
        
        // Create and download JSON file
        const jsonData = {
            exportDate: new Date().toLocaleString('fr-FR'),
            recipient: "YSYRAEL",
            theme: "Messages d'amour France-Cameroun",
            messages: messages
        };
        
        const jsonString = JSON.stringify(jsonData, null, 2);
        const blob = new Blob([jsonString], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `love_messages_ysyrael_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // Display saved messages
    function displayMessages() {
        const messages = loadMessages();
        messagesList.innerHTML = '';
        
        if (messages.length === 0) {
            messagesList.innerHTML = '<div style="color: #999; font-style: italic;">Aucun message sauvegardé pour le moment...</div>';
            return;
        }

        messages.forEach((message, index) => {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'saved-message-item';
            messageDiv.innerHTML = `
                <div class="saved-message-time">${message.timestamp}</div>
                <div>${message.text}</div>
                <button class="delete-message" onclick="deleteMessage(${index})">×</button>
            `;
            messagesList.appendChild(messageDiv);
        });
    }

    // Save new message
    function saveMessage() {
        const text = messageInput.value.trim();
        if (text === '') return;

        const messages = loadMessages();
        const newMessage = {
            text: text,
            timestamp: new Date().toLocaleString('fr-FR')
        };

        messages.unshift(newMessage); // Add to beginning
        saveMessages(messages);
        
        messageInput.value = '';
        
        // Show success feedback
        const successMsg = document.createElement('div');
        successMsg.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #4CAF50; color: white; padding: 10px 20px; border-radius: 20px; z-index: 10000; animation: fadeInOut 2s;';
        successMsg.textContent = 'Message sauvegardé avec succès ! 💕';
        document.body.appendChild(successMsg);
        setTimeout(() => successMsg.remove(), 2000);
        
        createChatHeart(); // Add heart effect
    }

    // Delete message
    window.deleteMessage = function(index) {
        const messages = loadMessages();
        messages.splice(index, 1);
        saveMessages(messages);
        displayMessages();
        createChatHeart();
    }

    // Toggle saved messages view
    viewMessagesBtn.addEventListener('click', () => {
        savedMessages.classList.toggle('active');
        if (savedMessages.classList.contains('active')) {
            displayMessages();
            viewMessagesBtn.textContent = '📝 Cacher messages';
        } else {
            viewMessagesBtn.textContent = '📋 Voir messages';
        }
    });

    // Save message on button click
    saveMessageBtn.addEventListener('click', saveMessage);

    // Save message on Ctrl+Enter in textarea
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) {
            e.preventDefault();
            saveMessage();
        }
    });

    // Add event listener for JSON view button
    const viewJsonBtn = document.getElementById('viewJsonBtn');
    if (viewJsonBtn) {
        viewJsonBtn.addEventListener('click', viewJsonData);
    }

    // Function to view JSON data
    function viewJsonData() {
        const messages = loadMessages();
        const jsonData = {
            exportDate: new Date().toLocaleString('fr-FR'),
            recipient: "YSYRAEL",
            theme: "Messages d'amour France-Cameroun",
            messages: messages
        };
        const jsonString = JSON.stringify(jsonData, null, 2);
        const jsonBlob = new Blob([jsonString], { type: 'application/json' });
        const jsonUrl = URL.createObjectURL(jsonBlob);
        const jsonA = document.createElement('a');
        jsonA.href = jsonUrl;
        jsonA.download = `love_messages_ysyrael_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(jsonA);
        jsonA.click();
        document.body.removeChild(jsonA);
        URL.revokeObjectURL(jsonUrl);
    }

    // Add fade animation CSS
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>
